<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

    <title>Web Security Tester - WEBSec Tester</title>
</head>
<body>
    <div class="container-fluid">
        <h2 class="text-center">Web Security Tester - WEBSec Tester</h2>

        <form action="/scan" method="post">
            <div class="form-row">
                <div class="form-group col-md-2">&nbsp;</div>
                <div class="form-group col-md-4">
                    <label for="staticURL">Enter URL</label>
                    <input type="text" class="form-control" name="url" id="staticURL" placeholder="https://example.com" required>
                </div>
                <div class="form-group col-md-4">
                    <label for="inputTest">Select Test</label>
                    <select class="form-control" name="test_type" id="inputTest" required>
                        <option value="">-- Select a test --</option>
                        <option value="cors">CORS Test</option>
                        <option value="header">Header Security</option>
                        <option value="sqli">SQL Injection Test</option>
                        <option value="load">Load Test</option>
                        <option value="all">Run All</option>
                    </select>
                </div>
                <div class="form-group col-md-2">&nbsp;</div>
                <div class="form-group col-md-2">&nbsp;</div>
                <div class="form-group col-md-8 align-self-end">
                    <button type="submit" class="btn btn-primary mb-2">Run Test</button>
                </div>
                <div class="form-group col-md-2">&nbsp;</div>
            </div>
        </form>
    </div>
</body>
</html>
